<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TapWalk - Step Counter</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@500;700&display=swap');

        :root {
            --bg-color: #ffffff;
            --primary-color: #000000;
            --text-main: #000000;
            --btn-blue: #007bff;
            --btn-orange: #FFA500;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            height: 100%;
            margin: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden; /* Prevent scrolling */
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
            justify-content: space-between; /* Space out elements evenly */
        }

        header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .btn-reset {
            background: var(--btn-orange);
            color: var(--text-main);
            font-size: 0.9rem;
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 700; /* Bold font */
        }

        .btn-reset:active {
            opacity: 0.8;
        }

        .counter-display {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: black;
            flex-shrink: 0;
        }

        #count {
            font-size: 4.5rem;
            font-weight: 700;
            color: white;
            line-height: 1;
        }

        .controls {
            width: 100%;
            display: flex;
            justify-content: center;
            padding-bottom: 2rem;
        }

        button {
            border: none;
            outline: none;
            font-family: 'Outfit', sans-serif;
        }

        .btn-tap {
            background: var(--btn-blue);
            color: white;
            font-size: 2rem;
            width: 75%; /* Reduced width */
            padding: 1rem;
            height: 80px; /* Kept large for easy tapping */
            border-radius: 14px;
            cursor: pointer;
            font-weight: 700;
        }

        .btn-tap:active {
            background: #0056b3; /* Simple color change active state, no transform/shadow */
        }


        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .modal-content {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            text-align: center;
            width: 80%;
            max-width: 300px;
        }

        .modal h2 {
            font-size: 1.25rem;
            margin-bottom: 1.5rem;
            color: black;
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .btn-modal {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            font-size: 1rem;
        }

        .btn-cancel {
            background: #f1f5f9;
            color: #475569;
        }

        .btn-confirm {
            background: #ef4444;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>TapWalk</h1>
            <button class="btn-reset" onclick="showResetConfirmation()">Reset</button>
        </header>

        <div class="counter-display" id="display">
            <div id="count">0</div>
        </div>

        <div class="controls">
            <button class="btn-tap" id="btn-tap" onclick="increment()">TAP</button>
        </div>
    </div>

    <!-- Reset Confirmation Modal -->
    <div class="modal" id="resetModal">
        <div class="modal-content">
            <h2>Reset Counter?</h2>
            <div class="modal-actions">
                <button class="btn-modal btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-modal btn-confirm" onclick="confirmReset()">Reset</button>
            </div>
        </div>
    </div>

    <script>
        let count = 0;
        const countEl = document.getElementById('count');
        const modal = document.getElementById('resetModal');

        // Load saved count
        const savedCount = localStorage.getItem('tapwalk_count');
        if (savedCount !== null) {
            count = parseInt(savedCount, 10);
            updateDisplay();
        }

        function increment() {
            count++;
            updateDisplay();
            saveCount();

            // Haptic feedback if supported
            if (navigator.vibrate) {
                navigator.vibrate(50);
            }
        }

        function showResetConfirmation() {
            if (count > 0) {
                modal.style.display = 'flex';
            }
        }

        function closeModal() {
            modal.style.display = 'none';
        }

        function confirmReset() {
            count = 0;
            updateDisplay();
            saveCount();
            closeModal();
        }

        function updateDisplay() {
            countEl.textContent = count;
        }

        function saveCount() {
            localStorage.setItem('tapwalk_count', count.toString());
        }

        // Prevent double tap zoom on mobile
        document.addEventListener('dblclick', function(event) {
            event.preventDefault();
        }, { passive: false });

        // Service Worker Registration for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => {
                        console.log('ServiceWorker registration successful with scope: ', registration.scope);
                    })
                    .catch(error => {
                        console.log('ServiceWorker registration failed: ', error);
                    });
            });
        }
    </script>
</body>
</html>
